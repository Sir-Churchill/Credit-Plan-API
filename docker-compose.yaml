services:
  db:
    image: mysql:8.0
    container_name: finance_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${password}
      MYSQL_DATABASE: ${db}
      MYSQL_USER: ${user}
      MYSQL_PASSWORD: ${password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: finance_app
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "mysql+aiomysql://{user}:{password}@db:3306/finance_db"
    volumes:
      - .:/app
      - ./data_csv:/app/data_csv

volumes:
  mysql_data: